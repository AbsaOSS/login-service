loginsvc:
  rest:
    # Rest General Config
    jwt:
      #Configuration to generate the key in memory
      generate-in-memory:
        access-exp-time: 15min
        refresh-exp-time: 9h
        key-rotation-time: 9h
        key-lay-over-time: 15min
        key-phase-out-time: 15min
        alg-name: "RS256"
        allow-providers-to-refresh-groups-on-generate: false
      #Instead of generating the key in memory
      #The Below Config allows for the application to fetch keys from AWS Secrets Manager.
      #aws-secrets-manager:
        #secret-name: "secret"
        #region: "region"
        #private-key-field-name: "privateKey"
        #public-key-field-name: "publicKey"
        #access-exp-time: 15min
        #refresh-exp-time: 9h
        #poll-time: 5min
        #key-lay-over-time: 15min
        #key-phase-out-time: 15min
        #alg-name: "RS256"
        #allow-providers-to-refresh-groups-on-generate: false
    config:
      # Generates git.properties file for use on info endpoint.
      git-info:
        # Generate Git Information on each run of the application.
        generate-git-properties: true
        # Generate git.properties file on application startup.
        # Generate-git-properties must be true for this config to take effect.
        # Once file has been generated, you may set these properties to false as the application will now read the details from the generated file on start-up.
        generate-git-properties-file: false

    # Rest Auth Config (AD)
    auth:
      provider:
        # Users (config-defined)
        users:
          # Auth Protocol
          # Set the order of the protocol starting from 1
          # Set to 0 to disable or simply exclude the users tag from config
          # NOTE: At least 1 auth protocol needs to be enabled
          order: 1
          known-users:
            - username: "user1"
              password: "password1"
              groups: []
            - username: "TestUser"
              password: "password123"
              groups:
                - "groupA"
                - "groupB"
              attributes:
                displayname: "Test User, A.C.E."
                email: "test@abs.com"
        ldap:
          # Auth Protocol
          # Set the order of the protocol starting from 1
          # Set to 0 to disable or simply exclude the ldap tag from config
          # NOTE: At least 1 auth protocol needs to be enabled
          order: 0
          domain: "some.domain.com"
          url: "ldaps://some.domain.com:636/"
          search-filter: "(samaccountname={1})"
          service-account:
            # The account-pattern is used to format the username of the user to be used to authenticate with the ldap server.
            account-pattern: "CN=%s,OU=Users,OU=Organization1,DC=my,DC=domain,DC=com"
            # The in-config-account is used to authenticate with the ldap server.
            in-config-account:
                username: "svc-ldap"
                password: "password"
          # Instead of using the in-config-account, the application can fetch the username and password from AWS Secrets Manager.
          #aws-secrets-manager-account:
              #secret-name: "secret"
              #region: "region"
              #username-field-name: "username"
              #password-field-name: "password"
          # As an Alternative to Secrets, you may use AWS Systems Manager
          #aws-systems-manager-account
            #parameter: "parameter path"
            #decrypt-if-secure: true
            #username-field-name: "username"
            #password-field-name: "password"
          # Enables Kerberos Authentication to the Login-Service
          #enable-kerberos:
            #krb-file-location: "/etc/krb5.conf"
            #keytab-file-location: "/etc/keytab"
            #spn: "HTTP/Host"
            #debug: true
          # Enable the ability for ldap calls to be retried if the service is unreachable
          #ldap-retry:
            #attempts: 3
            #delay-ms: 100
          attributes:
            # The FieldName is the key used to search ldap and the value is the value used to name the JWT claim.
            # ldapFieldName: claimFieldName
            mail: "email"
            displayname: "displayname"
        # MS Entra (Azure AD) Bearer token authentication provider.
        # Users with a valid Entra access token can exchange it for a login-service JWT.
        #entra:
          # Set the order of the protocol starting from 1
          # Set to 0 to disable or simply exclude the entra tag from config
          # NOTE: At least 1 auth protocol needs to be enabled
          #order: 0
          # Azure AD tenant ID (directory ID)
          #tenant-id: "your-tenant-id"
          # Application (client) ID registered in Entra
          #client-id: "your-client-id"
          # Client secret used to call MS Graph API for on-premises username resolution.
          # When set, the authenticated user's UPN is exchanged for their lower-case
          # samAccountName
          # via Graph API. Omit to use the UPN from the token directly.
          #client-secret: "your-client-secret"
          # Accepted JWT 'aud' claim values — tokens from any listed application are accepted;
          # use an empty list to accept any token issued by the configured tenant
          #audiences:
            #- "api://your-client-id"
            #- "other-app-client-id"
          # Mapping from on-premises DNS domain names to NetBIOS short names.
          # Required when client-secret is set and users have on-premises AD accounts.
          # These mapped values are used to allow known domains and log the mapped AB value.
          #domains:
            #corp.example.com: "CORP"
            #another.domain.com: "ANOTHER"
          # Base URL for Microsoft login/token endpoints.
          # Defaults to the public Azure cloud. Override for sovereign clouds.
          #login-base-url: "https://login.microsoftonline.com"
          # Base URL for the Microsoft Graph API.
          # Defaults to the public Azure cloud. Override for sovereign clouds.
          #graph-base-url: "https://graph.microsoft.com"
          # Optional mapping from Entra JWT claim names to LS JWT claim names
          #attributes:
            #preferred_username: "upn"
            #email: "email"
          # JWKS fetching timeouts (milliseconds) used when downloading Microsoft's
          # JSON Web Key Set from the OIDC discovery endpoint. Defaults to 10000 each
          # (10 seconds) if omitted. Tune for slow networks or when Microsoft's
          # endpoint is under load.
          #jwks-connect-timeout-ms: 10000
          #jwks-read-timeout-ms: 10000

    experimental:
      # ability to enable experimental endpoints (default=false)
      enabled: false

# App Config
spring:
  application:
    name: "login-service"
  jmx:
    enabled: true
server:
  port: 9090

# Health and Info Check Config + JMX Config
springdoc:
  show-actuator: true

management:
  # Expose information under Actuator/info
  info:
    # Exposes any property marked under "info" in the config
    env:
      enabled: "true"
    # Exposes git related information from the git.properties file
    git:
      enabled: "true"
    # Exposes Java runtime information
    java:
      enabled: "true"
    # Exposes build information
    build:
      enabled: "true"
  endpoints:
    jmx:
      exposure:
        include:
          - "health"
          - "info"
    web:
      exposure:
        include:
          - "health"
          - "info"
  endpoint:
    health:
      show-details: "always"

# Information to be exposed by the 'env' tag in the springboot actuator
info:
  app:
    name: "${spring.application.name}"
    build: "0.1"
    description: "Application used a reusable authentication tool"
    env: "Dev"
  security:
    ldap: "Enabled"
