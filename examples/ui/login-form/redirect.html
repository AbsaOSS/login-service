<!--
  MSAL redirect bridge page (MSAL Browser v5+).

  Azure AD redirects the popup (or hidden iframe) here after authentication.
  The bridge script reads the auth response from the URL and broadcasts it
  back to the main application window via BroadcastChannel, where the MSAL
  instance resolves the loginPopup() / acquireTokenPopup() promise.

  Rules per MSAL docs:
    - Only the bridge script may run here (no app logic, no routing).
    - Must NOT be served with Cross-Origin-Opener-Policy headers.
    - Must NOT be cached (serve with Cache-Control: no-store).
    - Must be registered as a redirect URI in the Entra app registration.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Authenticating…</title>
</head>
<body>
  <script src="dist/redirect.js" defer></script>
</body>
</html>
